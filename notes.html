<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIRUI KONG'S WEBSITE — Notes</title>
  <meta name="description" content="ScienceDirect-inspired notes hub.">
  <link rel="icon" type="image/png" href="assets/favicon-kzr.png">
  <style>
    :root{--bg:#f7f3ea;--panel:#fffdf8;--ink:#161616;--muted:#6e665a;--line:#201f1b22}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:Inter,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink)}
    .top{position:sticky;top:0;z-index:50;background:rgba(247,243,234,.88);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
    .top-inner{width:100%;padding:12px 24px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center}
    .brand img{width:80px;filter:brightness(0);display:block}
    .nav{display:flex;justify-content:flex-end;gap:14px;flex-wrap:wrap}.nav a{text-decoration:none;color:#241f19;opacity:.76;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}.nav a.active,.nav a:hover{opacity:1}

    .hero{width:100%;padding:44px 24px 18px}
    .eyebrow{margin:0;color:var(--muted);font-size:12px;letter-spacing:.18em;text-transform:uppercase}
    h1{margin:8px 0 10px;font-size:clamp(42px,8vw,108px);line-height:.88;letter-spacing:-.045em;text-transform:uppercase}
    .lead{margin:0;max-width:820px;font-size:18px;line-height:1.56;color:#322c24}

    .notes-marquee{margin-top:14px;border:1px solid #cfd6dc;background:#eceae6;border-radius:14px;overflow:hidden;position:relative}
    .notes-track{display:flex;gap:62px;width:max-content;padding:12px 0;animation:notes-scroll 52s linear infinite}
    .notes-text{font-size:clamp(70px,13.5vw,196px);line-height:.84;font-weight:900;letter-spacing:-.04em;text-transform:uppercase;color:#151922;white-space:nowrap}
    .notes-text.muted{color:#afb4b9}
    @keyframes notes-scroll{from{transform:translateX(0)}to{transform:translateX(-50%)}}

    .section{width:100%;padding:18px 24px 44px}
    .panel{background:var(--panel);border:1px solid var(--line);padding:18px}
    .head{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid var(--line);padding-bottom:10px;margin-bottom:16px}
    .head h2{margin:0;font-size:clamp(28px,4vw,52px);letter-spacing:-.03em;text-transform:uppercase}
    .count{font-family:ui-monospace,Menlo,monospace;color:var(--muted);font-size:12px}
    .empty{padding:20px;border:1px dashed #1114;color:var(--muted);background:#fff}

    @media (max-width:700px){.top-inner{grid-template-columns:auto 1fr}.hero{padding-top:28px}}
  </style>
  <link rel="stylesheet" href="global-loader.css?v=20260526">
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <a class="brand" href="index.html#home" aria-label="KZR Home"><img src="assets/kzr-logo-black.png" alt="KZR logo"></a>
      <nav class="nav" aria-label="Notes navigation">
        <a href="index.html#home">Home</a>
        <a href="about.html">About</a>
        <a href="resources.html">ARCHIVE</a>
        <a class="active" href="notes.html">Notes</a>
        <a href="materials.html">Materials</a>
      </nav>
    </div>
  </header>

  <section class="hero">
    <div class="notes-marquee" aria-label="Notes marquee">
      <div class="notes-track">
        <span class="notes-text">Notes ✶</span>
        <span class="notes-text muted">Notes ✶</span>
        <span class="notes-text">Notes ✶</span>
        <span class="notes-text muted">Notes ✶</span>
      </div>
    </div>
  </section>

  <main class="section">
    <section class="panel" aria-label="Note resources">
      <div class="head">
        <h2>Resources</h2>
        <span class="count">[00-00]</span>
      </div>
      <div class="empty">暂无笔记资源。</div>
    </section>
  </main>
  <script src="global-loader.js?v=20260526" defer></script>
</body>
</html>
