<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIRUI KONG'S WEBSITE — Materials</title>
  <meta name="description" content="ScienceDirect-inspired materials portal.">
  <link rel="icon" type="image/png" href="assets/favicon-kzr.png">
  <style>
    :root{--bg:#f6f1e6;--ink:#151515;--muted:#5f5a50;--line:#1a1a1a;--link:#241f19;--panel:#f2ede2;--accent:#d45d39}
    *{box-sizing:border-box} html{scroll-behavior:smooth} body{margin:0;font-family:Inter,"Helvetica Neue",Arial,sans-serif;background:var(--bg);color:var(--ink)}
    a{color:var(--link);text-decoration:none}
    .top{position:sticky;top:0;z-index:50;background:rgba(246,241,230,.9);backdrop-filter:blur(10px);border-bottom:1px solid #201f1b22}
    .top-inner{width:100%;padding:12px 24px;display:grid;grid-template-columns:auto 1fr;gap:16px;align-items:center}
    .brand img{width:80px;filter:brightness(0);display:block}
    .nav{display:flex;justify-content:flex-end;gap:14px;flex-wrap:wrap}.nav a{text-decoration:none;color:#241f19;opacity:.76;font-size:12px;letter-spacing:.12em;text-transform:uppercase;font-weight:700}.nav a.active,.nav a:hover{opacity:1}

    .hero{width:100%;padding:24px 30px 0;background:var(--panel)}
    .hero-top{border-top:2px solid var(--line);padding-top:16px}
    .hero h1{margin:0;font-size:64px;line-height:.9;letter-spacing:-.03em;font-weight:600}
    .hero h1 .dot{color:var(--accent)}

    .search-wrap{background:var(--panel);padding:16px 30px 18px;border-bottom:2px solid var(--line)}
    .search-grid{display:grid;grid-template-columns:minmax(0,2.2fr) minmax(0,1fr) auto;gap:10px;align-items:center}
    .search-input,.search-select{height:42px;border:1.5px solid #1f1f1f;background:#f9f5eb;padding:0 12px;font-size:14px}
    .search-btn{height:42px;border:1.5px solid #1f1f1f;background:#151515;color:#f7f3ea;padding:0 18px;font-size:13px;letter-spacing:.08em;text-transform:uppercase;font-weight:700}

    .db-shell{background:var(--panel);padding:14px 30px 30px}
    .db-table{border:1.5px solid var(--line)}
    .db-head{display:grid;grid-template-columns:1.3fr 1fr .55fr .75fr;gap:0;border-bottom:2px solid var(--line);font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:#3d3a33}
    .db-head span{padding:10px 12px;border-right:1.5px solid var(--line)}
    .db-head span:last-child{border-right:0}

    .db-row{display:grid;grid-template-columns:1.3fr 1fr .55fr .75fr;gap:0;align-items:stretch}
    .db-cell{padding:12px;border-right:1.5px solid var(--line);display:flex;align-items:center}
    .db-cell:last-child{border-right:0}

    .course-title{margin:0;font-size:24px;line-height:1.15;letter-spacing:-.01em}
    .course-title a{color:inherit;text-decoration:none}
    .course-title a:hover{text-decoration:underline}
    .category{font-size:15px;font-weight:600}
    .section{font-size:15px;font-weight:600}
    .status{font-size:12px;letter-spacing:.08em;text-transform:uppercase;border:1px solid #1a1a1a;display:inline-block;padding:3px 8px}
    .folder-items{margin:8px 0 0;padding-left:18px;font-size:13px;line-height:1.4}
    .folder-items li{margin:2px 0}

    @media (max-width:980px){
      .search-grid{grid-template-columns:1fr}
      .db-head{display:none}
      .db-table{border:0}
      .db-row{grid-template-columns:1fr;border:1.5px solid var(--line);margin-bottom:12px}
      .db-cell{border-right:0;border-bottom:1px solid var(--line)}
      .db-cell:last-child{border-bottom:0}
      .hero,.search-wrap,.db-shell{padding-left:20px;padding-right:20px}
      .hero h1{font-size:42px}
    }
  </style>
  <link rel="stylesheet" href="global-loader.css?v=20260526">
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <a class="brand" href="index.html#home" aria-label="KZR Home"><img src="assets/kzr-logo-black.png" alt="KZR logo"></a>
      <nav class="nav" aria-label="Materials navigation">
        <a href="index.html#home">Home</a>
        <a href="about.html">About</a>
        <a href="resources.html">ARCHIVE</a>
        <a href="notes.html">Notes</a>
        <a class="active" href="materials.html">Materials</a>
      </nav>
    </div>
  </header>

  <section class="hero" aria-label="Materials hero">
    <div class="hero-top">
      <h1>Materials<span class="dot">.</span></h1>
    </div>
  </section>

  <section class="search-wrap" aria-label="Materials search">
    <div class="search-grid">
      <input class="search-input" type="search" placeholder="Search topic, method, journal, or keyword">
      <select class="search-select" aria-label="Discipline filter">
        <option value="all">All Disciplines</option>
      </select>
      <button class="search-btn" id="materialsSearchBtn" type="button">Search</button>
    </div>
  </section>

  <main class="db-shell" id="catalog">
    <div class="db-table">
      <div class="db-head">
      <span>Course / Resource</span><span>Discipline</span><span>Section</span><span>Status</span>
      </div>
      <div id="materialsRows"></div>
    </div>
  </main>

  <script src="materials-data.js"></script>
  <script>
    const rowsEl = document.getElementById('materialsRows');
    const searchInput = document.querySelector('.search-input');
    const disciplineSelect = document.querySelector('.search-select');
    const searchBtn = document.getElementById('materialsSearchBtn');

    function createEntryMarkup(entry) {
      const isFolder = entry.type === 'folder';
      const linkOrTitle = entry.url
        ? `<a href="${entry.url}" target="_blank" rel="noreferrer">${entry.title}</a>`
        : `${entry.title}`;
      const folderItems = isFolder && Array.isArray(entry.children) && entry.children.length
        ? `<ul class="folder-items">${entry.children.map((child) => {
            const childLabel = child.url ? `<a href="${child.url}" target="_blank" rel="noreferrer">${child.title}</a>` : child.title;
            return `<li>${childLabel}</li>`;
          }).join('')}</ul>`
        : '';

      return `
        <article class="db-row">
          <div class="db-cell">
            <div>
              <h2 class="course-title">${linkOrTitle}</h2>
              ${folderItems}
            </div>
          </div>
          <div class="db-cell"><span class="category">${entry.discipline || '-'}</span></div>
          <div class="db-cell"><span class="section">${entry.section || '-'}</span></div>
          <div class="db-cell"><span class="status">${entry.status || '-'}</span></div>
        </article>
      `;
    }

    function renderMaterials(entries) {
      rowsEl.innerHTML = entries.length
        ? entries.map(createEntryMarkup).join('')
        : '<article class="db-row"><div class="db-cell" style="grid-column:1 / -1;">No matching entries.</div></article>';
    }

    function syncDisciplineOptions() {
      const disciplines = (window.MATERIALS_DB && window.MATERIALS_DB.disciplines) || [];
      disciplineSelect.innerHTML = '<option value="all">All Disciplines</option>' + disciplines.map((d) => `<option value="${d}">${d}</option>`).join('');
    }

    function runFilter() {
      const q = (searchInput.value || '').trim().toLowerCase();
      const selected = disciplineSelect.value;
      const allEntries = (window.MATERIALS_DB && window.MATERIALS_DB.entries) || [];
      const filtered = allEntries.filter((entry) => {
        const passDiscipline = selected === 'all' || entry.discipline === selected;
        const fieldText = [entry.title, entry.discipline, entry.section, entry.status, ...(entry.children || []).map(c => c.title)].join(' ').toLowerCase();
        const passQuery = !q || fieldText.includes(q);
        return passDiscipline && passQuery;
      });
      renderMaterials(filtered);
    }

    syncDisciplineOptions();
    runFilter();
    searchBtn.addEventListener('click', runFilter);
    disciplineSelect.addEventListener('change', runFilter);
    searchInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') runFilter();
    });
  </script>
  <script src="global-loader.js?v=20260526" defer></script>
</body>
</html>
